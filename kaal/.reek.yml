---
detectors:
  UncommunicativeVariableName:
    accept:
      - e
      - t
      - _
  TooManyStatements:
    enabled: true
    max_statements: 25
  TooManyMethods:
    enabled: true
    max_methods: 30
  BooleanParameter:
    enabled: false
  ControlParameter:
    enabled: false
  TooManyConstants:
    enabled: true
    max_constants: 30
  LongParameterList:
    enabled: true
    max_params: 10
  TooManyInstanceVariables:
    enabled: true
    max_instance_variables: 10
  DataClump:
    enabled: false
  DuplicateMethodCall:
    enabled: true
    exclude:
      - Kaal::Railtie#self.register_signal_handlers
      - Kaal::Coordinator#each_enabled_entry
  MissingSafeMethod:
    enabled: true
    exclude:
      - Kaal::Coordinator
  ManualDispatch:
    enabled: true
    exclude:
      - Kaal::Railtie#self.chain_previous_handler
      - Kaal::Registry#validate_entry
      - Kaal::Coordinator#already_dispatched?
      - Kaal::Coordinator#cleanup_old_dispatch_records
      - Kaal#dispatch_log_registry
      - Kaal#dispatched?
      - Kaal::Backend::DispatchLogging#log_dispatch_attempt
      - Kaal::Backend::RedisAdapter#initialize
  UtilityFunction:
    enabled: true
    exclude:
      - Kaal::Dispatch::DatabaseEngine#cleanup
      - Kaal::Dispatch::DatabaseEngine#find_by_key
      - Kaal::Dispatch::DatabaseEngine#find_by_node
      - Kaal::Dispatch::DatabaseEngine#find_by_status
      - Kaal::Dispatch::DatabaseEngine#find_dispatch
      - Kaal::Dispatch::DatabaseEngine#log_dispatch
      - Kaal::Dispatch::MemoryEngine#build_key
      - Kaal::Dispatch::RedisEngine#convert_timestamps
      - Kaal::Backend::DispatchLogging#parse_lock_key
      - Kaal::Backend::SQLiteAdapter#wrapped_contention_error?
  FeatureEnvy:
    enabled: true
    exclude:
      - Kaal::Configuration#handle_known_key
      - Kaal::Configuration#normalize_value
      - Kaal::Coordinator#find_occurrences
      - Kaal::Coordinator#already_dispatched?
      - Kaal::Coordinator#cleanup_old_dispatch_records
      - Kaal::Backend::DispatchLogging#log_dispatch_attempt
  NilCheck:
    enabled: true
    exclude:
      - Kaal::Coordinator#stop!
      - Kaal::Coordinator#already_dispatched?
      - Kaal::Coordinator#cleanup_old_dispatch_records
      - Kaal#dispatch_log_registry
      - Kaal#dispatched?

exclude_paths:
  - spec/**/*
  - db/**/*
  - bin/*
  - config/**/*
  - vendor/**/*
